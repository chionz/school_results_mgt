{% extends "base.html" %}

{% block content %}
<section class="content-grid content-grid--wide">
    <article class="card">
        <div class="card-head">
            <div>
                <p class="panel-label">Catalogue</p>
                <h3>Create subject</h3>
            </div>
        </div>
        <form id="createSubjectForm" class="form-grid">
            <label>
                Subject name
                <input id="newSubject" type="text" placeholder="Mathematics" required>
            </label>
            <button type="submit" class="primary-button">Create subject</button>
        </form>
    </article>

    <article class="card">
        <div class="card-head">
            <div>
                <p class="panel-label">Permissions</p>
                <h3>Assign subject to class</h3>
            </div>
        </div>
        <form id="assignSubjectForm" class="form-grid form-grid--two">
            <label>
                Class
                <select id="classSelect" required>
                    <option value="">Select class</option>
                    {% for class_item in classes %}
                    <option value="{{ class_item.id }}" {% if selected_class and selected_class|string == class_item.id|string %}selected{% endif %}>
                        {{ class_item.name }}
                    </option>
                    {% endfor %}
                </select>
            </label>
            <label>
                Subject
                <select id="subjectSelect" required>
                    <option value="">Select subject</option>
                    {% for subject in subjects %}
                    <option value="{{ subject.id }}">{{ subject.name }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                Subject teacher
                <select id="subjectTeacherId">
                    <option value="">Assign later</option>
                    {% for teacher in teachers %}
                    <option value="{{ teacher.id }}">{{ teacher.full_name }}</option>
                    {% endfor %}
                </select>
            </label>
            <button type="submit" class="primary-button">Save assignment</button>
        </form>
    </article>
</section>

<section class="card">
    <div class="card-head">
        <div>
            <p class="panel-label">Reference</p>
            <h3>Class subject assignments</h3>
        </div>
    </div>
    <div id="subjectAssignments" class="assignment-board"></div>
</section>
{% endblock %}

{% block scripts %}
<script>
    async function renderAssignments(classId) {
        const container = document.getElementById("subjectAssignments");
        if (!classId) {
            container.innerHTML = '<p class="empty-state">Select a class to see current subject assignments.</p>';
            return;
        }

        try {
            const assignments = await window.rms.request(`/api/subjects/class_subjects/${classId}`);
            if (!assignments.length) {
                container.innerHTML = '<p class="empty-state">No subjects assigned to this class yet.</p>';
                return;
            }

            container.innerHTML = assignments.map((assignment) => `
                <div class="assignment-card">
                    <strong>${assignment.subject_name}</strong>
                    <p>${assignment.teacher_name || "No teacher assigned yet"}</p>
                </div>
            `).join("");
        } catch (error) {
            container.innerHTML = `<p class="empty-state">${error.message}</p>`;
        }
    }

    document.getElementById("classSelect").addEventListener("change", (event) => {
        renderAssignments(event.target.value);
    });

    document.getElementById("createSubjectForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
            await window.rms.request("/api/subjects/", {
                method: "POST",
                body: JSON.stringify({ name: document.getElementById("newSubject").value.trim() })
            });
            window.rms.toast("Subject created.");
            window.location.reload();
        } catch (error) {
            window.rms.toast(error.message, "error");
        }
    });

    document.getElementById("assignSubjectForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const classId = document.getElementById("classSelect").value;
        try {
            await window.rms.request("/api/subjects/class_subjects/", {
                method: "POST",
                body: JSON.stringify({
                    class_id: Number(classId),
                    subject_id: Number(document.getElementById("subjectSelect").value),
                    teacher_id: document.getElementById("subjectTeacherId").value || null
                })
            });
            window.rms.toast("Subject assignment saved.");
            renderAssignments(classId);
        } catch (error) {
            window.rms.toast(error.message, "error");
        }
    });

    renderAssignments(document.getElementById("classSelect").value);
</script>
{% endblock %}
